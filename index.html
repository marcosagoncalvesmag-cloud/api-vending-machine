<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Totem Bebidas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: black;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .tela {
      display: none;
      width: 100%;
      height: 100vh;
    }

    .ativa {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🔥 TELA INICIAL COM IMAGEM */
    #inicio {
      background: url("Maquina_copao.png") no-repeat center center;
      background-size: contain;

      /* efeito de acender */
      animation: brilho 2s infinite alternate;
    }

    @keyframes brilho {
      from {
        filter: brightness(0.85);
      }
      to {
        filter: brightness(1.15);
      }
    }

    /* 🍹 TELA DE BEBIDAS */
    #bebidas {
      background: #111;
      flex-direction: column;
      gap: 20px;
    }

    .botao {
      width: 80%;
      max-width: 400px;
      padding: 20px;
      font-size: 1.5rem;
      border: none;
      border-radius: 10px;
      background: #00c853;
      color: white;
    }

    .botao:active {
      background: #009624;
    }
  </style>
</head>

<body>

  <!-- TELA INICIAL -->
  <div id="inicio" class="tela ativa"></div>

  <!-- TELA DE BEBIDAS -->
  <div id="bebidas" class="tela">
    <button class="botao" onclick="selecionarBebida(1)">Gin + Energético 1</button>
    <button class="botao" onclick="selecionarBebida(2)">Gin + Energético 2</button>
    <button class="botao" onclick="selecionarBebida(3)">Gin Puro</button>
  </div>

  <script>
    const telaInicio = document.getElementById("inicio");
    const telaBebidas = document.getElementById("bebidas");

    // toque na tela inicial
    telaInicio.addEventListener("click", () => {
      telaInicio.classList.remove("ativa");
      telaBebidas.classList.add("ativa");
    });

    function selecionarBebida(tipo) {
      console.log("Bebida escolhida:", tipo);
      alert("Selecionado: " + tipo);
    }
  </script>

</body>
</html>
