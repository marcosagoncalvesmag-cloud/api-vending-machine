<script>
        const API_URL = 'https://perennial-overload-slit.ngrok-free.dev'; 
        const telaInicio = document.getElementById("inicio");
        const telaBebidas = document.getElementById("bebidas");

        // Cria a tela de pagamento dinamicamente no DOM
        document.body.insertAdjacentHTML('beforeend', `
            <div id="pagamento" class="tela" style="flex-direction:column; align-items:center; justify-content:center; background:#000;">
                <h2 id="msg-status">Gerando QR Code...</h2>
                <img id="qr-code-img" src="" style="width:250px; background:white; padding:10px;">
            </div>
        `);

        telaInicio.addEventListener("click", () => {
            telaInicio.classList.remove("ativa");
            telaBebidas.classList.add("ativa");
        });

        async function addItem(nome, valor) {
            telaBebidas.classList.remove("ativa");
            document.getElementById("pagamento").classList.add("ativa");
            document.getElementById("msg-status").innerText = "Gerando QR Code...";

            // Inicia a comunicação direta com o servidor
            const res = await fetch(`${API_URL}/criar-pagamento`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bebida: nome })
            });
            const data = await res.json();

            document.getElementById('qr-code-img').src = data.qrcode;
            document.getElementById('msg-status').innerText = "Aguardando pagamento...";

            // Monitora o status via polling na mesma rota que o ESP usa
            const intervalo = setInterval(async () => {
                const statusRes = await fetch(`${API_URL}/verificar-acao`);
                const statusData = await statusRes.json();

                if (statusData.comando === "liberar") {
                    clearInterval(intervalo);
                    document.getElementById('msg-status').innerText = "Pagamento Aprovado!";
                    document.getElementById('qr-code-img').style.display = 'none';
                    setTimeout(() => location.reload(), 3000);
                }
            }, 1000);
        }
    </script>
