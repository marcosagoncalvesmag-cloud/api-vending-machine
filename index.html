<script>
        const API_URL = 'https://perennial-overload-slit.ngrok-free.dev'; 

        function irParaBebidas() {
            document.getElementById("inicio").classList.remove("ativa");
            document.getElementById("bebidas").classList.add("ativa");
        }

        async function selecionarBebida(nome) {
            document.getElementById('bebidas').classList.remove('ativa');
            document.getElementById('pagamento').classList.add('ativa');
            document.getElementById('msg-status').innerText = "Gerando QR Code...";
            document.getElementById('qr-code-img').style.display = 'block';

            // Solicita o QR Code para o servidor
            const res = await fetch(`${API_URL}/criar-pagamento`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bebida: nome })
            });
            const data = await res.json();
            
            // Exibe a imagem do QR Code recebida
            document.getElementById('qr-code-img').src = data.qrcode;
            document.getElementById('msg-status').innerText = "Aguardando pagamento...";

            // Inicia o monitoramento (agora o servidor monitora, nós só avisamos o cliente)
            aguardarConfirmacao();
        }

        function aguardarConfirmacao() {
            // O front-end fica perguntando ao servidor se a liberação foi autorizada
            // Vamos usar o ESP para isso? Ou o front-end também quer saber?
            // Baseado no seu fluxo, o servidor muda o status para "liberar".
            // Vamos adicionar uma rota simples no servidor para o Front saber quando liberar:
            
            const intervalo = setInterval(async () => {
                const res = await fetch(`${API_URL}/verificar-acao`);
                const data = await res.json();

                if (data.comando === "liberar") {
                    clearInterval(intervalo);
                    document.getElementById('msg-status').innerText = 
                        `Pagamento Aprovado! Liberando ${data.bebida}...`;
                    document.getElementById('qr-code-img').style.display = 'none';
                    
                    // Opcional: Voltar para o início após alguns segundos
                    setTimeout(() => location.reload(), 5000);
                }
            }, 1000); // Verifica a cada 1 segundo
        }
    </script>
