<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Máquina do Copão</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: white;
}

/* GRID DAS BEBIDAS */
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: #1a1a1a;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(255, 106, 0, 0.3);
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.03);
}

/* IMAGEM (placeholder por enquanto) */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background-color: #333;
}

/* TEXTO */
.info {
    padding: 15px;
}

.nome {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.preco {
    font-size: 20px;
    color: #ff6a00;
    font-weight: bold;
}

/* BOTÃO */
.botao {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #ff6a00, #ff3c00);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.botao:active {
    transform: scale(0.95);
}
</style>

</head>

<body>

<div class="container">

    <div class="card">
        <img src="img1.png">
        <div class="info">
            <div class="nome">GIN + ENERGÉTICO TROPICAL SEM GELO</div>
            <div class="preco">R$ 15,00</div>
            <button class="botao">Selecionar</button>
        </div>
    </div>

    <div class="card">
        <img src="img2.png">
        <div class="info">
            <div class="nome">GIN + ENERGÉTICO MELANCIA SEM GELO</div>
            <div class="preco">R$ 15,00</div>
            <button class="botao">Selecionar</button>
        </div>
    </div>

    <div class="card">
        <img src="img3.png">
        <div class="info">
            <div class="nome">GIN TROPICAL PURO DOSE</div>
            <div class="preco">R$ 10,00</div>
            <button class="botao">Selecionar</button>
        </div>
    </div>

    <div class="card">
        <img src="img4.png">
        <div class="info">
            <div class="nome">GIN MELANCIA PURO DOSE</div>
            <div class="preco">R$ 10,00</div>
            <button class="botao">Selecionar</button>
        </div>
    </div>

</div>

</body>
</html>
