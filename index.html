<script>
        const API_URL = 'https://perennial-overload-slit.ngrok-free.dev'; // Sua URL
        const telaInicio = document.getElementById("inicio");
        const telaBebidas = document.getElementById("bebidas");
        
        // Adicionando uma tela de pagamento dinâmica no DOM
        document.body.insertAdjacentHTML('beforeend', `
            <div id="pagamento" class="tela" style="flex-direction:column; align-items:center; justify-content:center; background:#000;">
                <h2 id="msg-status">Gerando QR Code...</h2>
                <img id="qr-code-img" src="" style="width:250px; background:white; padding:10px;">
            </div>
        `);

        let total = 0;
        telaInicio.addEventListener("click", () => {
            telaInicio.classList.remove("ativa");
            telaBebidas.classList.add("ativa");
        });

        function addItem(nome, valor) {
            const lista = document.getElementById("itens");
            const item = document.createElement("div");
            item.innerText = nome + " - R$ " + valor.toFixed(2);
            lista.appendChild(item);
            total += valor;
            document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);
            
            // Adicionamos um botão de finalizar se não existir
            if (!document.getElementById("btn-finalizar")) {
                const btnFin = document.createElement("button");
                btnFin.id = "btn-finalizar";
                btnFin.innerText = "FINALIZAR PAGAMENTO";
                btnFin.className = "btn";
                btnFin.style.marginTop = "20px";
                btnFin.onclick = finalizarCompra;
                document.querySelector(".carrinho").appendChild(btnFin);
            }
        }

        async function finalizarCompra() {
            telaBebidas.classList.remove("ativa");
            document.getElementById("pagamento").classList.add("ativa");

            const res = await fetch(`${API_URL}/criar-pagamento`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bebida: "Total: R$ " + total.toFixed(2) })
            });
            const data = await res.json();
            
            document.getElementById('qr-code-img').src = data.qrcode;
            document.getElementById('msg-status').innerText = "Escaneie o QR Code";

            // Monitoramento
            const intervalo = setInterval(async () => {
                const statusRes = await fetch(`${API_URL}/verificar-acao`);
                const statusData = await statusRes.json();

                if (statusData.comando === "liberar") {
                    clearInterval(intervalo);
                    document.getElementById('msg-status').innerText = "Pagamento Aprovado!";
                    setTimeout(() => location.reload(), 3000);
                }
            }, 1000);
        }
    </script>
