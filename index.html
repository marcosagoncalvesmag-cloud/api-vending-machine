<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Máquina do Copão</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
}

.tela {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.ativa {
    display: flex;
}

button {
    padding: 20px;
    margin: 10px;
    font-size: 20px;
    background: orange;
    border: none;
    border-radius: 10px;
    color: #000;
}
</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="inicio" class="tela ativa">
    <h1>Escolha sua bebida</h1>

    <button onclick="escolherBebida(1)">Bebida 1 - R$0,50</button>
    <button onclick="escolherBebida(2)">Bebida 2 - R$0,50</button>
    <button onclick="escolherBebida(3)">Bebida 3 - R$0,50</button>
</div>

<!-- TELA PAGAMENTO -->
<div id="pagamento" class="tela">
    <h1>Escaneie o QR Code</h1>
    <img id="qrcode" src="" width="200">
</div>

<!-- TELA APROVADO -->
<div id="aprovado" class="tela">
    <h1>Pagamento aprovado</h1>
    <p>Posicione o copo e aperte o botão</p>
</div>

<script>

let bebidaSelecionada = null;
let pedidoId = null;

// troca de tela
function mudarTela(id) {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');
}

// escolher bebida
function escolherBebida(num) {
    bebidaSelecionada = num;

    fetch("/criar-pagamento", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ bebida: num })
    })
    .then(res => res.json())
    .then(data => {
        pedidoId = data.id;

        document.getElementById("qrcode").src = data.qrcode;

        mudarTela("pagamento");

        verificarPagamento();
    });
}

// polling pagamento
function verificarPagamento() {
    let intervalo = setInterval(() => {

        fetch(`/status/${pedidoId}`)
        .then(res => res.json())
        .then(data => {

            if (data.status === "pago") {
                clearInterval(intervalo);
                mudarTela("aprovado");
                esperarEntrega();
            }

        });

    }, 2000);
}

// esperar ESP entregar bebida
function esperarEntrega() {
    let intervalo = setInterval(() => {

        fetch(`/entregue/${pedidoId}`)
        .then(res => res.json())
        .then(data => {

            if (data.status === "ok") {
                clearInterval(intervalo);
                mudarTela("inicio");
            }

        });

    }, 2000);
}

</script>

</body>
</html>
