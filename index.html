<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Totem Bebidas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .tela {
      display: none;
      width: 100%;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .ativa {
      display: flex;
    }

    /* Tela inicial */
    #inicio {
      background: #000;
      font-size: 2rem;
      text-align: center;
    }

    /* Tela de bebidas */
    #bebidas {
      background: #111;
      gap: 20px;
    }

    .botao {
      width: 80%;
      max-width: 400px;
      padding: 20px;
      font-size: 1.5rem;
      border: none;
      border-radius: 10px;
      background: #00c853;
      color: #fff;
    }

    .botao:active {
      background: #009624;
    }
  </style>

</head>

<body>

  <!-- Tela inicial -->

  <div id="inicio" class="tela ativa">
    <div>TOQUE NA TELA PARA COMEÇAR</div>
  </div>

  <!-- Tela de bebidas -->

  <div id="bebidas" class="tela">
    <button class="botao" onclick="selecionarBebida(1)">Gin + Energético 1</button>
    <button class="botao" onclick="selecionarBebida(2)">Gin + Energético 2</button>
    <button class="botao" onclick="selecionarBebida(3)">Gin Puro</button>
  </div>

  <script>
    const telaInicio = document.getElementById("inicio");
    const telaBebidas = document.getElementById("bebidas");

    // Clique na tela inicial
    telaInicio.addEventListener("click", () => {
      telaInicio.classList.remove("ativa");
      telaBebidas.classList.add("ativa");
    });

    function selecionarBebida(tipo) {
      console.log("Bebida escolhida:", tipo);

      // Aqui depois você vai chamar o servidor
      // fetch("URL_DO_SERVIDOR", {...})

      alert("Selecionado: " + tipo);
    }
  </script>

</body>
</html>
